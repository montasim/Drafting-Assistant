name: Release unpacked extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_ZIP: Drafting-Assistant-${{ github.ref_name }}-chrome-unpacked.zip
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Package unpacked Chrome extension
        run: |
          mkdir -p release
          test -f .output/manifest.json
          cd .output
          zip -r "../release/${RELEASE_ZIP}" .
      - name: Validate unpacked package layout
        run: unzip -Z1 "release/${RELEASE_ZIP}" | grep -Fxq manifest.json
      - name: Create checksum
        run: sha256sum "${RELEASE_ZIP}" > "${RELEASE_ZIP}.sha256"
        working-directory: release
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "release/${RELEASE_ZIP}" \
            "release/${RELEASE_ZIP}.sha256" \
            --title "Drafting Assistant ${GITHUB_REF_NAME}" \
            --notes-file .github/RELEASE_NOTES.md
